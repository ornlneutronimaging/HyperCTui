name: packaging and deployment

on:
  workflow_dispatch:
  push:
    branches: [qa, main]
    tags: ['v*']

permissions:
  contents: read

# cancel previous job if new commit is pushed (tags are distinct refs, so an
# in-flight tag publish is never cancelled by another push)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # versioningit needs full history + tags, else it falls back to
          # default-tag (0.1.0) and the built package is mis-versioned
          fetch-depth: 0
          fetch-tags: true
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          manifest-path: pyproject.toml
          environments: package
      - name: build conda package
        run: pixi run -e package build-conda

      # micromamba reads a LOCAL channel only from an absolute path; a bare
      # "conda.recipe" is resolved as a *remote* channel (404 on anaconda.org).
      # Stage the built noarch package into a clean absolute channel dir.
      - name: Stage built package into a local channel
        run: |
          mkdir -p /tmp/local-channel/noarch
          cp conda.recipe/noarch/hyperctui*.tar.bz2 /tmp/local-channel/noarch/

      # conda-verify is archived (no modern-Python builds); verification is
      # the org-standard pkg-install (micromamba env from the local channel)
      # + pkg-verify (import check) pair
      - name: Install built conda package
        id: install
        uses: neutrons/conda-actions/pkg-install@bba9ca89d48d9ae846db9650cc63fde736340b3d # v2
        with:
          package-name: hyperctui
          local-channel: /tmp/local-channel

      - name: Verify conda package
        uses: neutrons/conda-actions/pkg-verify@bba9ca89d48d9ae846db9650cc63fde736340b3d # v2
        with:
          package-name: hyperctui
          module-name: hyperctui
          conda-env-name: ${{ steps.install.outputs.conda_env }}
      - name: upload conda package to anaconda
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
          IS_RC: ${{ contains(github.ref, 'rc') }}
        run: |
          # label is main or rc depending on the tag-name
          CONDA_LABEL="main"
          if [ "${IS_RC}" = "true" ]; then CONDA_LABEL="rc"; fi
          echo pushing ${{ github.ref }} with label $CONDA_LABEL
          pixi run -e package anaconda upload --label $CONDA_LABEL --user neutronimaging conda.recipe/noarch/hyperctui*.tar.bz2

  pypi-publish:
    name: upload release to PyPI
    runs-on: ubuntu-latest
    permissions:
      # job-level permissions replace the workflow block, so checkout's
      # read access must be restated here
      contents: read
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          # versioningit needs full history + tags, else it falls back to
          # default-tag (0.1.0) and the built package is mis-versioned
          fetch-depth: 0
          fetch-tags: true
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          manifest-path: pyproject.toml
          environments: package
      - name: build pypi package
        run: pixi run -e package build-pypi
      # publish your distributions here (need to setup on PyPI first)
      - name: Publish package distributions to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
