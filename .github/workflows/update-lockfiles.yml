name: Update lockfiles

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
  schedule:
    - cron: 0 5 1 * *

jobs:
  pixi-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          run-install: false
      - name: Update lockfiles
        run: |
          set -o pipefail
          pixi update --json > update_output.json
          if pixi exec pixi-diff-to-markdown < update_output.json > diff.md 2>&1; then
            echo "Lockfile diff generated successfully"
          else
            echo "## Pixi Lockfile Update" > diff.md
            echo "" >> diff.md
            echo "The pixi lockfiles have been updated. The diff could not be automatically generated." >> diff.md
            echo "" >> diff.md
            echo "Please review the changes to \`pixi.lock\` for details." >> diff.md
          fi
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Update pixi lockfile
          title: Update pixi lockfile
          body-path: diff.md
          branch: update-pixi
          base: next  # change this to the default branch of your repository
          labels: pixi
          delete-branch: true
          add-paths: pixi.lock
